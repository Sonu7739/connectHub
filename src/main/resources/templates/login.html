<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ConnectHub Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                linear-gradient(135deg, rgba(79, 70, 229, 0.85), rgba(6, 182, 212, 0.75)),
                url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1600&q=80') no-repeat center center/cover;
            overflow: hidden;
            position: relative;
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 0;
        }

        body::before {
            width: 260px;
            height: 260px;
            background: rgba(255, 255, 255, 0.18);
            top: 8%;
            left: 10%;
        }

        body::after {
            width: 320px;
            height: 320px;
            background: rgba(255, 255, 255, 0.12);
            bottom: 8%;
            right: 10%;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 40px 32px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.22);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            color: white;
        }

        .brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand h1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .brand p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.82);
        }

        .error {
            background: rgba(255, 77, 77, 0.18);
            border: 1px solid rgba(255, 77, 77, 0.35);
            color: #ffe5e5;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 18px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        .input-box {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s ease;
        }

        .input-box::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .input-box:focus {
            border-color: rgba(255, 255, 255, 0.55);
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.08);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85);
        }

        .options a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        .options a:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.92);
            color: #1e293b;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            background: white;
        }

        .register-text {
            margin-top: 22px;
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.88);
        }

        .register-text a {
            color: white;
            text-decoration: none;
            font-weight: 700;
        }

        .register-text a:hover {
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            .login-container {
                margin: 20px;
                padding: 32px 22px;
            }

            .brand h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="brand">
        <h1>ConnectHub</h1>
        <p>Welcome back! Login to continue.</p>
    </div>

    <div th:if="${param.error}" class="error">
        Invalid username or password.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="input-group">
            <label for="username">Username</label>
            <input id="username" type="text" name="username" class="input-box" placeholder="Enter your username" required>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input id="password" type="password" name="password" class="input-box" placeholder="Enter your password" required>
        </div>

        <div class="options">
            <span>Secure Login</span>
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <p class="register-text">
        Don’t have an account?
        <a th:href="@{/register}">Register here</a>
    </p>
</div>

</body>
</html>
