<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Problem - ConnectHub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-wrapper">
    <div class="main-container">

        <section class="card">
            <div class="section-header">
                <h2>Edit Problem</h2>
            </div>

            <form th:action="@{'/problem/' + ${problem.id} + '/edit'}" method="post">
                <div class="form-group">
                    <input type="text" name="title" th:value="${problem.title}" required>
                </div>

                <div class="form-group">
                    <textarea name="description" rows="8" required th:text="${problem.description}"></textarea>
                </div>

                <button type="submit" class="primary-btn">Update Problem</button>
            </form>
        </section>

    </div>
</div>

</body>
</html>
