<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Solution - ConnectHub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-wrapper">
    <div class="main-container">

        <section class="card">
            <div class="section-header">
                <h2>Edit Solution</h2>
            </div>

            <form th:action="@{'/solution/' + ${solution.id} + '/edit'}" method="post">
                <div class="form-group">
                    <textarea name="content" rows="8" required th:text="${solution.content}"></textarea>
                </div>

                <button type="submit" class="primary-btn">Update Solution</button>
            </form>
        </section>

    </div>
</div>

</body>
</html>
